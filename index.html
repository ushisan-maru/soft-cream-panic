<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ソフトクリーム・パニック・メーカー v7</title>
    <style>
        :root { --bg-color: #f0f2f5; --axis-color: #333; }
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; overflow: hidden; background: var(--bg-color); }
        
        /* 登録画面 */
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: white;
            z-index: 1000; display: flex; flex-direction: column; align-items: center; padding: 20px;
            box-sizing: border-box; overflow-y: auto;
        }

        .input-row {
            display: flex; align-items: center; gap: 10px; padding: 8px;
            border: 1px solid #eee; border-radius: 5px; background: #fafafa;
        }
        .preview-box {
            width: 45px; height: 45px; border: 1px solid #ccc; background: #ddd;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            font-size: 10px; color: #666; flex-shrink: 0;
        }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* メイン画面構成 */
        #main-screen { display: none; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        #content-area { display: flex; flex: 1; position: relative; overflow: hidden; height: calc(100vh - 80px); }

        /* 出力対象エリア */
        #export-container { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }

        /* ヘッダーエリア */
        #chart-header {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 3px solid #333; background: #fff; flex-shrink: 0;
        }
        .chart-title { font-size: 1.8rem; font-weight: bold; color: #000; }
        .chart-date { font-size: 1.1rem; color: #333; font-weight: bold; }

        /* XY平面 */
        #canvas-container { flex: 1; position: relative; cursor: crosshair; overflow: hidden; }
        
        .axis { position: absolute; background: var(--axis-color); pointer-events: none; }
        .axis-h { width: 100%; height: 4px; top: 50%; left: 0; transform: translateY(-50%); }
        .axis-v { width: 4px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
        .arrow { position: absolute; width: 0; height: 0; border-style: solid; pointer-events: none; }
        .arrow-up { top: 0; left: 50%; transform: translateX(-50%); border-width: 0 12px 24px 12px; border-color: transparent transparent var(--axis-color) transparent; }
        .arrow-down { bottom: 0; left: 50%; transform: translateX(-50%); border-width: 24px 12px 0 12px; border-color: var(--axis-color) transparent transparent transparent; }
        .arrow-right { right: 0; top: 50%; transform: translateY(-50%); border-width: 12px 0 12px 24px; border-color: transparent transparent transparent var(--axis-color); }
        .arrow-left { left: 0; top: 50%; transform: translateY(-50%); border-width: 12px 24px 12px 0; border-color: transparent var(--axis-color) transparent transparent; }

        .label { 
            position: absolute; font-weight: bold; font-size: 1.6rem; pointer-events: none; 
            color: #fff; background: #333; padding: 6px 12px; border-radius: 6px; z-index: 10;
        }

        #sidebar { width: 220px; background: #f8f9fa; border-left: 1px solid #ccc; overflow-y: auto; padding: 10px; box-sizing: border-box; flex-shrink: 0; }
        
        /* フッター・操作パネル */
        #footer { height: 80px; background: #222; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 500; color: white; }
        .control-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #444; padding-right: 15px; }

        .draggable-item { cursor: grab; margin-bottom: 15px; border: 1px solid #ddd; background: #fff; padding: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .placed-item { position: absolute; cursor: move; text-align: center; user-select: none; touch-action: none; z-index: 20; }
        .placed-item img { display: block; pointer-events: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #fff; width: 100%; height: auto; }
        .item-name { font-size: 14px; margin-top: 5px; font-weight: bold; background: white; border: 2px solid #333; padding: 2px 6px; border-radius: 4px; display: inline-block; color: #000; }

        button { padding: 10px 18px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-main { background: #ff4757; color: white; }
        .btn-x { background: #000; color: white; border: 1px solid #444; }
        .btn-sub { background: #555; color: white; }
        select { padding: 8px; border-radius: 4px; border: none; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="setup-screen">
    <h1 style="font-size: 2rem; color: #333;">🍦 ソフトクリーム・パニック・メーカー</h1>
    <p>画像を選んで名前を入力してください（最大50個）</p>
    <div id="input-fields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 1100px;"></div>
    <button class="btn-main" onclick="startApp()" style="margin:40px 0; width: 300px; font-size: 1.2rem;">配置画面へ進む</button>
</div>

<div id="main-screen">
    <div id="content-area">
        <div id="export-container">
            <div id="chart-header">
                <div class="chart-title">ソフトクリームの機械が壊れて全然止まらない</div>
                <div class="chart-date" id="current-date"></div>
            </div>
            <div id="canvas-container">
                <div class="axis axis-h"></div><div class="axis axis-v"></div>
                <div class="arrow arrow-up"></div><div class="arrow arrow-down"></div>
                <div class="arrow arrow-right"></div><div class="arrow arrow-left"></div>
                <div class="label" style="top: 40px; left: 52%;">巻き続ける</div>
                <div class="label" style="bottom: 40px; left: 52%;">放置</div>
                <div class="label" style="top: 42%; right: 40px;">パニック</div>
                <div class="label" style="top: 42%; left: 40px;">平常心</div>
                <div id="drop-zone" style="width:100%; height:100%; position:relative;"></div>
            </div>
        </div>
        <div id="sidebar"><h3>未使用リスト</h3><div id="sidebar-content"></div></div>
    </div>
    <div id="footer">
        <div class="control-group">
            <span>画像縮小率:</span>
            <select id="size-selector" onchange="updateImageSizes()">
                </select>
            <button class="btn-sub" onclick="resetImageSize()" style="padding: 8px 12px; font-size: 12px;">100%にリセット</button>
        </div>
        <button class="btn-main" onclick="exportImage()">画像保存</button>
        <button class="btn-x" onclick="shareOnX()">Xで共有</button>
        <button class="btn-sub" onclick="location.reload()">最初から</button>
    </div>
</div>

<script>
    const setupScreen = document.getElementById('setup-screen');
    const mainScreen = document.getElementById('main-screen');
    const inputFields = document.getElementById('input-fields');
    const sidebarContent = document.getElementById('sidebar-content');
    const dropZone = document.getElementById('drop-zone');
    const sizeSelector = document.getElementById('size-selector');

    let items = [];
    let activeItem = null;
    let offset = { x: 0, y: 0 };
    let currentScale = 1.0; // 現在の縮小率

    // 縮小率プルダウンの生成 (10% to 100%, 5% steps)
    for (let i = 100; i >= 10; i -= 5) {
        const opt = document.createElement('option');
        opt.value = i / 100;
        opt.innerText = i + "%";
        sizeSelector.appendChild(opt);
    }

    // 縮小率の更新処理
    function updateImageSizes() {
        currentScale = parseFloat(sizeSelector.value);
        items.forEach(item => {
            if (item.element) {
                applyScaleToElement(item);
            }
        });
    }

    function resetImageSize() {
        sizeSelector.value = "1";
        updateImageSizes();
    }

    function applyScaleToElement(item) {
        // 元の基準サイズ(max 150x200)に対して縮小率を掛ける
        const baseW = item.baseSize.w;
        item.element.style.width = (baseW * currentScale) + "px";
        // 文字サイズも少し調整（必要なら）
        const nameLabel = item.element.querySelector('.item-name');
        nameLabel.style.fontSize = Math.max(10, 14 * currentScale) + "px";
    }

    // --- 既存の基本機能 ---

    for (let i = 0; i < 50; i++) {
        const div = document.createElement('div');
        div.className = "input-row";
        div.innerHTML = `<div class="preview-box" id="prev-box-${i}">No img</div>
            <div style="display:flex; flex-direction:column; gap:2px;">
                <input type="file" accept="image/*" id="file-${i}" onchange="previewFile(${i})" style="width:160px; font-size:10px;">
                <input type="text" placeholder="画像URL" id="url-${i}" onchange="previewUrl(${i})" style="width:154px; font-size:10px;">
                <input type="text" maxlength="10" placeholder="名前" id="name-${i}" style="width:154px;">
            </div>`;
        inputFields.appendChild(div);
    }

    async function previewFile(index) {
        const file = document.getElementById(`file-${index}`).files[0];
        if (file) { const src = await toBase64(file); document.getElementById(`prev-box-${index}`).innerHTML = `<img src="${src}">`; }
    }

    function previewUrl(index) {
        const url = document.getElementById(`url-${index}`).value;
        if (url) { document.getElementById(`prev-box-${index}`).innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='Error'">`; }
    }

    async function startApp() {
        items = [];
        for (let i = 0; i < 50; i++) {
            const file = document.getElementById(`file-${i}`).files[0];
            const url = document.getElementById(`url-${i}`).value;
            const name = document.getElementById(`name-${i}`).value;
            let src = file ? await toBase64(file) : url;
            if (src) items.push({ id: i, src, name, placed: false, element: null, baseSize: null });
        }
        if (items.length === 0) return alert("画像を登録してください");
        setupScreen.style.display = 'none';
        mainScreen.style.display = 'flex';
        const now = new Date();
        document.getElementById('current-date').innerText = `作成日: ${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
        renderSidebar();
    }

    function toBase64(file) { return new Promise(resolve => { const reader = new FileReader(); reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); }); }
    function calculateBaseSize(w, h) { 
        let tw = (w / h) * 200; let th = 200; 
        if (tw > 150) { tw = 150; th = (h / w) * 150; } 
        return { w: tw, h: th }; 
    }

    function renderSidebar() {
        sidebarContent.innerHTML = "";
        items.filter(item => !item.placed).forEach(item => {
            const container = document.createElement('div');
            container.className = "draggable-item";
            const img = new Image(); img.src = item.src; img.style.width = "100%";
            container.appendChild(img);
            if(item.name) { const n = document.createElement('div'); n.innerText = item.name; n.style.fontSize = "12px"; n.style.textAlign = "center"; container.appendChild(n); }
            container.onmousedown = (e) => initDrag(e, item, true);
            container.ontouchstart = (e) => initDrag(e, item, true);
            sidebarContent.appendChild(container);
        });
    }

    function initDrag(e, item, isNew) {
        e.preventDefault();
        const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        if (isNew) {
            const tImg = new Image(); tImg.src = item.src;
            tImg.onload = () => { 
                item.baseSize = calculateBaseSize(tImg.width, tImg.height);
                createPlacedElement(item, cx, cy); 
                startMoving(e, item.element); 
            };
        } else { startMoving(e, item.element); }
    }

    function createPlacedElement(item, x, y) {
        const div = document.createElement('div');
        div.className = "placed-item";
        
        const img = new Image(); img.src = item.src;
        const nameSpan = document.createElement('div'); nameSpan.className = "item-name"; nameSpan.innerText = item.name || "";
        
        div.appendChild(img); div.appendChild(nameSpan);
        item.element = div;

        // 現在の縮小率を適用
        applyScaleToElement(item);

        div.oncontextmenu = (e) => { e.preventDefault(); item.placed = false; dropZone.removeChild(div); renderSidebar(); };
        div.onmousedown = (e) => startMoving(e, div);
        div.ontouchstart = (e) => startMoving(e, div);

        const rect = dropZone.getBoundingClientRect();
        // 中心座標を計算
        const currentW = item.baseSize.w * currentScale;
        div.style.left = (x - rect.left - currentW/2) + "px";
        div.style.top = (y - rect.top - 50) + "px";

        item.placed = true;
        dropZone.appendChild(div); renderSidebar();
    }

    function startMoving(e, el) {
        activeItem = el;
        let maxZ = 20; document.querySelectorAll('.placed-item').forEach(i => { const z = parseInt(i.style.zIndex) || 20; if(z > maxZ) maxZ = z; });
        el.style.zIndex = maxZ + 1;
        const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const r = el.getBoundingClientRect();
        offset.x = cx - r.left; offset.y = cy - r.top;
        document.addEventListener('mousemove', onMove); document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('mouseup', onStop); document.addEventListener('touchend', onStop);
    }

    function onMove(e) {
        if (!activeItem) return; e.preventDefault();
        const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const r = dropZone.getBoundingClientRect();
        activeItem.style.left = (cx - r.left - offset.x) + "px";
        activeItem.style.top = (cy - r.top - offset.y) + "px";
    }

    function onStop() { activeItem = null; document.removeEventListener('mousemove', onMove); document.removeEventListener('touchmove', onMove); }

    function exportImage() {
        const btn = event.target; btn.innerText = "生成中...";
        html2canvas(document.getElementById('export-container'), { useCORS: true, backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
            const a = document.createElement('a'); a.download = 'softcream-panic.png'; a.href = canvas.toDataURL("image/png"); a.click();
            btn.innerText = "画像保存";
        });
    }

    async function shareOnX() {
        const btn = event.target; btn.innerText = "準備中...";
        const canvas = await html2canvas(document.getElementById('export-container'), { useCORS: true, scale: 2 });
        canvas.toBlob(async (blob) => {
            try {
                const data = [new ClipboardItem({ [blob.type]: blob })];
                await navigator.clipboard.write(data);
                alert("画像をコピーしました！Xの投稿画面で「貼り付け」してください。");
            } catch(e) { alert("保存してから手動で添付してください"); }
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent("ソフトクリーム・パニック！ #ソフトクリームの機械が壊れて全然止まらない")}`, '_blank');
            btn.innerText = "Xで共有";
        });
    }
</script>
</body>
</html>
